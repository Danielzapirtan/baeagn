name: Goldbach Conjecture Check

on:
  workflow_dispatch:
    inputs:
      nmin:
        description: 'Starting even number (n ≥ 4)'
        required: true
        default: '4'
        type: string

jobs:
  check-goldbach:
    runs-on: ubuntu-latest
    timeout-minutes: 350  # 5 hours 50 minutes
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
        
    - name: Run Goldbach Checker
      run: |
        python -c "
        import time
        import math
        from datetime import datetime, timedelta

        def is_prime(num):
            if num < 2:
                return False
            for i in range(2, int(math.sqrt(num)) + 1):
                if num % i == 0:
                    return False
            return True

        def check_goldbach(n):
            for i in range(2, n//2 + 1):
                if is_prime(i) and is_prime(n - i):
                    return True
            return False

        try:
            nmin = int('${{ inputs.nmin }}')
            if nmin < 4 or nmin % 2 != 0:
                print('Error: Starting number must be an even number ≥ 4')
                exit(1)
        except ValueError:
            print('Error: Please provide a valid integer for nmin')
            exit(1)

        current = nmin
        end_time = datetime.now() + timedelta(hours=5, minutes=50)
        last_checked = current

        print(f'Starting Goldbach Conjecture check from {current} at {datetime.now()}')
        print(f'Will run until approximately {end_time}')

        while datetime.now() < end_time:
            if not check_goldbach(current):
                print(f'Counterexample found! {current} cannot be expressed as sum of two primes')
                exit(0)
            last_checked = current
            current += 2

        print(f'Time limit reached. Last even number checked: {last_checked}')
        print(f'All even numbers from {nmin} to {last_checked} satisfy the Goldbach Conjecture')
