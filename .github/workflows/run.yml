name: Run

on:
  workflow_dispatch:
    inputs:
      game_code:
        description: "Enter Game Code:"
        required: true
        type: string
      PGN:
        description: "Fill PGN text:"
        required: true
        type: string

jobs:
  build-and-test:
    name: Analyze Correspondence Chess Positions
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        depths: [6, 10, 12, 13]
        boards: [ ${{ game_code }} ]
      # Ensure all matrix jobs are reported, even if one fails
      fail-fast: false
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Install dependencies
      run: |
        sudo apt update
        sudo apt install -y build-essential pgn-extract clang-tools
        
    - name: Build project
      run: |
        test -f build.sh || (echo "File build.sh not found" && exit 1)
        chmod +x build.sh
        ./build.sh || echo "Compilation error"
        
    - name: Verify binary exists
      run: test -f baeagn || (echo "Binary not found" && exit 1)
      
    - name: Install binary
      run: sudo install -m 0755 baeagn /usr/local/bin
      
    - name: Check for benchmark script
      run: test -f bench.sh || (echo "Benchmark script not found" && exit 1)

    - name: Run benchmarks
      run: ./bench.sh "$BOARD" "$DEPTH"
      env:
        BOARD: ${{ matrix.boards }}
        DEPTH: ${{ matrix.depths }}
        
    - name: Upload analysis files
      uses: actions/upload-artifact@v4
      with:
        name: analysis-${{ matrix.boards }}-${{ matrix.depths }}
        path: ${{ matrix.boards }}.d${{ matrix.depths }}.anl

